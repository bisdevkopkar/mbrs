        [...new Set(

async function loadData(){

            await fetch(API_URL);

            await response.json();
        document.getElementById("loading")
            .style.display = "none";

let pieOmzetObj = null;
let pieEbitdaObj = null;

function buatGrafik(){
    const tahun =
        document.getElementById(
        "cmbTahun"
        ).value;
    // data sesuai tahun terpilih
    const dataGrafik =
        allData.filter(x =>
        x.tahun == tahun &&
        x.progres == "P"
        );
    // destroy chart lama
    if(barChartObj) barChartObj.destroy();
    if(pieOmzetObj) pieOmzetObj.destroy();
    if(pieEbitdaObj) pieEbitdaObj.destroy();
    const units = {};
    dataGrafik.forEach(item => {
        if(!units[item.unit]){
            units[item.unit] = {
                omzet:0,
                ebitda:0
            };
        }
        const omzet =
            toNumber(item.omzet);
            units[item.unit].omzet += omzet;
        const ebitda =
            toNumber(item.ebitda);
            units[item.unit].ebitda += ebitda;
        const hasil =
            toDecimal(item.hasil);
            units[item.unit].ebitda += hasil;
    });
    // sorting
    const sorted =
        Object.entries(units)
        .sort((a,b)=>
            b[1].omzet - a[1].omzet
        );
    const labels =
        sorted.map(x=>x[0]);
    const omzet =
        sorted.map(x=>x[1].omzet);
    const ebitda =
        sorted.map(x=>x[1].ebitda);
    // warna kontras
    const colors = [
        "#e53935",
        "#8e24aa",
        "#3949ab",
        "#1e88e5",
        "#00897b",
        "#43a047",
        "#fdd835",
        "#fb8c00",
        "#6d4c41",
        "#546e7a",
        "#d81b60",
        "#5e35b1"
    ];

    // =========================
    // BAR CHART
    // =========================

    barChartObj = new Chart(
    document.getElementById("barChart"),
    {
        type:"bar",
        data:{
            labels:labels,
            datasets:[
                {
                    label:"Omzet",
                    data:omzet,
                    backgroundColor:"#1e88e5"
                },
                {
                    label:"EBITDA/Laba Bersih",
                    data:ebitda,
                    backgroundColor:"#43a047"
                }
            ]
        },
        options:{
            layout:{
                padding:{
                    top:10,
                    bottom:10,
                    left:10,
                    right:10
                }
            },
            responsive:true,
            maintainAspectRatio:false,
            plugins:{
                title:{
                    display:true,
                    text:"GRAFIK PENCAPAIAN KPI",
                    font:{
                        size:22,
                        weight:"bold"
                    },
                    padding:{
                        top:10,
                        bottom:20
                    },
                    color:"#1565c0"
                },
                datalabels:{
                    color:"#000",
                    anchor:"end",
                    align:"top",
                    rotation:-90,
                    offset:4,
                    font:{
                        size:8,
                        weight:"bold"
                    },
                    formatter:function(value){
                        return value.toLocaleString(
                            "id-ID",
                            {
                                minimumFractionDigits:0,
                                maximumFractionDigits:0
                            }
                        );
                    }
                }
            },
            scales:{
                x:{
                    ticks:{
                        font:{
                            size:10
                        }
                    }
                },

                y:{
                    ticks:{
                        font:{
                            size:10
                        }
                    }
                }

            }
        },
        plugins:[ChartDataLabels]
    }
    );

    // =========================
    // PIE OMZET
    // =========================

    pieOmzetObj = new Chart(
        document.getElementById("pieOmzet"),
        {
            type:"pie",
            data:{
                labels:labels,
                datasets:[{
                    data:omzet,
                    backgroundColor:colors,
                    radius:"90%"
                }]
            },
            options:{
                responsive:true,
                maintainAspectRatio:false,
                layout:{
                  padding:10
                },
                plugins:{
                    legend:{
                        display:false
                    },
                    title:{
                        display:true,
                        text:"PENCAPAIAN OMZET",
                        font:{
                            size:18,
                            weight:"bold"
                        },
                        padding:{
                            top:10,
                            bottom:10
                        },
                        color:"#1565c0"
                    }
                }
            }
        }
    );

    // =========================
    // PIE EBITDA
    // =========================

    pieEbitdaObj = new Chart(
        document.getElementById("pieEbitda"),
        {
            type:"pie",
            data:{
                labels:labels,
                datasets:[{
                    data:ebitda,
                    backgroundColor:colors,
                    radius:"90%"
                }]
            },
            options:{
                responsive:true,
                maintainAspectRatio:false,
                layout:{
                  padding:10
                },
                plugins:{
                    legend:{
                        display:false
                    },
                    title:{
                        display:true,
                        text:"PENCAPAIAN EBITDA/LABA BERSIH",
                        position:"bottom",
                        font:{
                            size:18,
                            weight:"bold"
                        },
                        padding:{

                        color:"#1565c0"

    // =========================

async function downloadDashboardPDF(){
    const { jsPDF } = window.jspdf;
    const dashboard =
        document.querySelector(".dashboard-content");
    const btn =
        dashboard.querySelector(
        ".download-dashboard-btn"
        );
        btn.style.display = "none";
    const closeBtn =
        dashboard.querySelector(
            ".close"
        );
        closeBtn.style.display = "none";
    // capture dashboard
    dashboard.style.height = "auto";
    const canvas =
        await html2canvas(dashboard, {
            scale:2,
            useCORS:true,
            backgroundColor:"#ffffff",
            windowWidth: dashboard.scrollWidth,
            windowHeight: dashboard.scrollHeight
        });
    const imgData =
        canvas.toDataURL("image/png");
    // ukuran canvas
    const imgWidth = canvas.width;
    const imgHeight = canvas.height;
    // buat PDF landscape
    const pdf =
        new jsPDF({
            orientation:"landscape",
            unit:"mm",
            format:"a4"
        });
    // ukuran halaman pdf
    const pageWidth =
        pdf.internal.pageSize.getWidth();
    const pageHeight =
        pdf.internal.pageSize.getHeight();
    // margin
    const margin = 5;
    // area tersedia
    const availableWidth =
        pageWidth - (margin * 2);
    const availableHeight =
        pageHeight - (margin * 2);
    // hitung rasio
    const ratio =
        Math.min(
            availableWidth / imgWidth,
            availableHeight / imgHeight
        );
    // ukuran final
    const finalWidth =
        imgWidth * ratio;
    const finalHeight =
        imgHeight * ratio;
    // posisi center
    const x =
        (pageWidth - finalWidth) / 2;
    const y =
        (pageHeight - finalHeight) / 2;
    // masukkan gambar
    pdf.addImage(
        imgData,
        "PNG",
        x,
        y,
        finalWidth,
        finalHeight
    );
    // download
    pdf.save("Dashboard_Tilik.pdf");
    dashboard.style.height = "96vh";
    btn.style.display = "block";
    closeBtn.style.display = "block";
}


function formatTanggal(tgl){
    if(!tgl) return "";
    tgl = tgl.toString();
    // pastikan 8 digit
    if(tgl.length != 8) return tgl;
    const tahun = tgl.substring(0,4);
    const bulan = tgl.substring(4,6);
    const hari = tgl.substring(6,8);
    return hari + "-" + bulan + "-" + tahun;
}

function hitungSummary(){
    // jumlah periode unik berdasarkan tanggal
    const uniqueTanggal =
        [...new Set(allData.map(x => x.tahun))];
    const totalPeriode =
        uniqueTanggal.length;
    // total temuan
    const totalTemuan =
        allData
        .filter(x => x.progres == "P")
        .reduce((a,b) =>
            a + (parseFloat(b.jumlah) || 0), 0);
    // total perbaikan
    const totalPerbaikan =
        allData
        .filter(x => x.progres == "P")
        .reduce((a,b) =>
            a + (parseFloat(b.jumlah) || 0), 0);
    // progress %
    let progress = 0;
    if(totalTemuan > 0){
        progress =
            (
                totalPerbaikan /
                totalTemuan
            ) * 100;
    }
    document.getElementById("totalPeriode")
        .innerText = totalPeriode;
    document.getElementById("totalTemuan")
        .innerText = totalTemuan;
    document.getElementById("totalPerbaikan")
        .innerText = totalPerbaikan;
    document.getElementById("totalProgress")
        .innerText =
            progress.toFixed(0) + "%";
}

function tampilData(data){
    const list =
        document.getElementById("listData");
    list.innerHTML = "";
    // MASTER = DATA T
    const dataT =
        data.filter(x =>
            x.progres == "T"
        );
    dataT.forEach(t => {
        // cari pasangan P
    const p =
            data.find(x =>
                x.progres == "P" &&
                x.tahun == t.tahun &&
                x.unit == t.unit
            );
    const tr =
            document.createElement("tr");
        tr.innerHTML = `
        <td align="center">
            ${t.tahun}
        </td>
        <td>
            ${t.unit}
        </td>
        <td>
            ${t.pimpinan}
        </td>
        <td align="right">
            ${formatAngka(toMoney(
                p ? p.omzet : t.omzet
            ))}
        </td>
        <td align="right">
            ${formatAngka(toMoney(
                p ? p.ebitda : t.ebitda
            ))}
        </td>
        <td align="center">
            ${formatHasil(
                p ? p.hasil : t.hasil
            )}
        </td>
        <td align="center">
            ${p ? p.nilai : t.nilai}
        </td>

    <td class="lampiran-cell">

    <!-- RENCANA -->
    <span class="icon-slot">
        ${t.fileId ? `
        <span class="pdf-icon"
            title="Rencana KPI"
            onclick="showPDF('${t.fileId}')">
            🖊️
        </span>
        ` : ""}
    </span>

    <!-- PROGRES -->
    <span class="icon-slot">
        ${p && p.fileId ? `
        <span class="pdf-icon"
            title="Progress KPI"
            onclick="showPDF('${p.fileId}')">
            🛂
        </span>
        ` : ""}
    </span>

    <!-- DASHBOARD -->
    <span class="icon-slot">
        <span class="pdf-icon"
            title="Dashboard Unit"
            onclick="openUnitDashboard('${t.unit}')">
            📊
        </span>
    </span>
    </td>
    `;
    list.appendChild(tr);
    });
}

function formatHasil(nilai){
    if(nilai == null || nilai == "")
        return "0,00";
    return parseFloat(nilai)
        .toLocaleString(
            "id-ID",
            {
                minimumFractionDigits:2,
                maximumFractionDigits:2
            }
        );
}

function toNumber(nilai){
    if(!nilai)
        return 0;
    // ubah ke string
    nilai = nilai.toString();
    // hapus titik ribuan
    nilai = nilai.replace(/\./g, "");
    // ganti koma jadi titik
    nilai = nilai.replace(",", ".");
    // convert number
    return parseFloat(nilai) || 0;
}

function toDecimal(nilai){
    if(!nilai)
        return 0;
    nilai = nilai.toString().trim();
    // hanya ganti koma ke titik
    nilai = nilai.replace(",", ".");
    return parseFloat(nilai) || 0;
}

function formatAngka(nilai){
    if(nilai == null || nilai == "")
        return "0,00";
    return parseFloat(nilai)
        .toLocaleString("id-ID", {
            minimumFractionDigits:2,
            maximumFractionDigits:2
        });
}

        a.tahun - b.tahun

        );

        dataUnit.map(x =>

    // =========================
    // EBITDA
    // =========================

function closeUnitDashboard(){
    document.getElementById(
        "unitDashboardModal"
    ).style.display = "none";
}

async function downloadUnitDashboardPDF(){
    const { jsPDF } = window.jspdf;
    const dashboard =
        document.querySelector(
            ".unit-dashboard-content"
        );
    const btn =
        dashboard.querySelector(
        ".download-dashboard-btn"
        );
        btn.style.display = "none";
    const closeBtn =
        dashboard.querySelector(
            ".close"
        );
        closeBtn.style.display = "none";
    dashboard.style.height = "auto";
    const canvas =
        await html2canvas(dashboard, {
            scale:2,
            useCORS:true,
            backgroundColor:"#ffffff",
            windowWidth: dashboard.scrollWidth,
            windowHeight: dashboard.scrollHeight
        });
    const imgData =
        canvas.toDataURL("image/png");
    const pdf =
        new jsPDF({
            orientation:"landscape",
            unit:"mm",
            format:"a4"
        });
    const pageWidth =
        pdf.internal.pageSize.getWidth();
    const pageHeight =
        pdf.internal.pageSize.getHeight();
    const margin = 5;
    const availableWidth =
        pageWidth - (margin * 2);
    const availableHeight =
        pageHeight - (margin * 2);
    const ratio =
        Math.min(
            availableWidth / canvas.width,
            availableHeight / canvas.height
        );
    const finalWidth =
        canvas.width * ratio;
    const finalHeight =
        canvas.height * ratio;
    const x =
        (pageWidth - finalWidth) / 2;
    const y =
        (pageHeight - finalHeight) / 2;
    pdf.addImage(
        imgData,
        "PNG",
        x,
        y,
        finalWidth,
        finalHeight
    );
    pdf.save("Dashboard_Unit.pdf");
    dashboard.style.height = "96vh";
    btn.style.display = "block";
    closeBtn.style.display = "block";
}
